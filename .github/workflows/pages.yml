name: Deploy to GitHub Pages

# Actions-based deploy (set Pages Source to "GitHub Actions"). More reliable than
# the legacy "Deploy from a branch" builder on frequently-updated repos, and it
# serialises deploys via the concurrency group below.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-flight one (let it finish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (exclude repo metadata)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true          # auto-enable Pages on a fresh fork
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
